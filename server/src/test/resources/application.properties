# Use in-memory H2 for local/unit tests to avoid external DB dependency.
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:easy_station_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Test profile should not rely on PostgreSQL-specific Flyway scripts.
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.flyway.baseline-on-migrate=false
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Security configuration for tests
%test.quarkus.security.users.embedded.enabled=true
%test.quarkus.security.users.embedded.plain-text=true
%test.quarkus.security.users.embedded.users.test=test
%test.quarkus.security.users.embedded.roles.test=user

# Disable Redis for unit tests (use in-memory fallback)
%test.auth.jwt.blacklist.enabled=false
%test.rate.limit.enabled=false
%test.quarkus.redis.devservices.enabled=false
%test.quarkus.redis.hosts=redis://localhost:6379

# Plugin configuration for tests
%test.plugin.directory=target/plugins