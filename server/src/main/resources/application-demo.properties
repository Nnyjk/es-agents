# ESA 演示环境配置 - 使用 H2 内存数据库
# 用法：java -Dquarkus.profile=demo -jar target/quarkus-app/quarkus-run.jar

# 数据库配置 - H2 内存数据库
%demo.quarkus.datasource.db-kind=h2
%demo.quarkus.datasource.username=sa
%demo.quarkus.datasource.password=sa
%demo.quarkus.datasource.jdbc.url=jdbc:h2:mem:easy_station_demo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Flyway 配置 - 演示环境禁用 Flyway，使用 Hibernate 自动生成
%demo.quarkus.flyway.migrate-at-start=false
%demo.quarkus.hibernate-orm.database.generation=drop-and-create

# HTTP 配置
%demo.quarkus.http.port=8080
%demo.quarkus.http.host=0.0.0.0

# 日志配置
%demo.quarkus.log.level=INFO
%demo.quarkus.log.category."com.easystation".level=DEBUG
