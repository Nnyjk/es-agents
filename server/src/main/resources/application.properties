# Application Configuration
quarkus.application.name=easy-station-server
quarkus.application.version=1.0.0-SNAPSHOT

# HTTP Server
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS

# Database Configuration (JDBC PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:sinoyd123}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://192.168.12.81:5432/easy_station}
# Hibernate Schema Validation (Flyway manages schema)
quarkus.hibernate-orm.database.generation=validate
# Disable import.sql as it's now in Flyway V1.0.0
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.hibernate-orm.log.sql=true
# Remove DDL generation config
# quarkus.hibernate-orm.scripts.generation=create
# quarkus.hibernate-orm.scripts.create-target=target/create_script.sql

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1.0.0
quarkus.flyway.table=flyway_schema_history

# JWT Configuration
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://easystation.com/issuer
smallrye.jwt.sign.key.location=privateKey.pem

# Authentication Configuration
auth.jwt.issuer=https://easystation.com/issuer
auth.jwt.access-token.expires-in=3600
auth.jwt.refresh-token.expires-in=604800
auth.login.max-failed-attempts=5
auth.login.lock-duration-minutes=30

# JWT Token Blacklist Configuration
auth.jwt.blacklist.enabled=true
auth.jwt.blacklist.ttl=86400

# OpenAPI/Swagger 配置
quarkus.smallrye-openapi.info-title=ES Agents API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=ES Agents 部署与管理平台 API
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# Micrometer / Prometheus 配置
quarkus.micrometer.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ============================================
# Redis Configuration
# ============================================
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
quarkus.redis.password=${REDIS_PASSWORD:}
quarkus.redis.database-index=${REDIS_DB:0}
quarkus.redis.pool.max-size=10
quarkus.redis.timeout=5s
# Cache TTL settings (in seconds)
app.cache.session.ttl=1800
app.cache.config.ttl=300
app.cache.hot-data.ttl=3600

# ============================================
# Database Connection Pool Optimization
# ============================================
# HikariCP connection pool settings
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.initial-size=5
quarkus.datasource.jdbc.acquisition-timeout=30s
quarkus.datasource.jdbc.background-validation-interval=1m
quarkus.datasource.jdbc.leak-detection-timeout=60s
quarkus.datasource.jdbc.idle-timeout=5m
quarkus.datasource.jdbc.max-lifetime=30m
quarkus.datasource.jdbc.validation-query=SELECT 1

# Hibernate Statistics & Slow Query Logging
quarkus.hibernate-orm.statistics=true
quarkus.hibernate-orm.query.plan-cache-max-size=2048
quarkus.hibernate-orm.query.plan-parameter-metadata-cache-size=128
# Log SQL statements slower than 100ms via JDBC warnings
quarkus.hibernate-orm.log-jdbc-warnings=true
quarkus.hibernate-orm.log.sql=true
app.hibernate.slow-query.threshold-ms=100

# ============================================
# Query Optimization Settings
# ============================================
# Enable batch fetching to reduce N+1 queries
quarkus.hibernate-orm.batch-fetch-size=25
# Use query plan cache for better performance
quarkus.hibernate-orm.query.query-plan-cache-max-size=2048
# Slow query logging using Quarkus native configuration
# (Hibernate 6 EmptyInterceptor doesn't support onPrepareStatement())
quarkus.hibernate-orm.log-jdbc-warnings=true
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.statistics=true
app.hibernate.slow-query.threshold-ms=100
