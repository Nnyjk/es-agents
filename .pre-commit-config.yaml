# 简化的 pre-commit 配置
# 只做格式检查，完整测试由 CI (PR Checks) 执行
# 这样可以加快提交速度，不阻塞开发进度

repos:
  - repo: local
    hooks:
      - id: prettier-check
        name: Prettier format check
        entry: bash scripts/pre-commit/prettier-check.sh
        language: system
        pass_filenames: false
        files: ^(\.github/|docs/|frontend/src/)

      - id: merge-markers-check
        name: Merge conflict markers check
        entry: bash scripts/pre-commit/merge-markers.sh
        language: system
        pass_filenames: false