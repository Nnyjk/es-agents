global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ESA Server metrics (Quarkus Micrometer)
  - job_name: 'esa-server'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/q/metrics'
    scrape_interval: 15s

  # ESA Agent metrics (Go Prometheus client)
  - job_name: 'esa-agent'
    static_configs:
      - targets: ['host.docker.internal:9090']
    metrics_path: '/metrics'
    scrape_interval: 15s
