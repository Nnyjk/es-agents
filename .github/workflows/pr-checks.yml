name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Test
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps
          npm run test:coverage
          npx tsc --noEmit

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 5

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Test & Coverage
        run: mvn -B test --file server/pom.xml

      - name: Verify Coverage
        run: mvn -B jacoco:check --file server/pom.xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/target/site/jacoco/jacoco.xml
          retention-days: 5

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Test & Coverage
        working-directory: ./agent
        run: |
          chmod +x coverage.sh
          ./coverage.sh

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: agent-coverage
          path: agent/coverage/cobertura.xml
          retention-days: 5

  coverage-report:
    needs: [frontend, server, agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-coverage"
          path: ./coverage-reports
          merge-multiple: true

      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage
          path: ./coverage-reports
          retention-days: 5

      - name: Coverage Report Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let report = '## 📊 Code Coverage Report\n\n';

            // Check Server coverage
            const serverCoveragePath = './coverage-reports/server-coverage/jacoco.xml';
            if (fs.existsSync(serverCoveragePath)) {
              report += '### Server (Java)\n';
              report += '- ✅ JaCoCo coverage check passed (70% threshold)\n';
              report += '- Report: `server/target/site/jacoco/jacoco.xml`\n\n';
            }

            // Check Agent coverage
            const agentCoveragePath = './coverage-reports/agent-coverage/cobertura.xml';
            if (fs.existsSync(agentCoveragePath)) {
              report += '### Agent (Go)\n';
              report += '- ✅ Coverage report generated\n';
              report += '- Report: `agent/coverage/cobertura.xml`\n\n';
            }

            // Check Frontend coverage
            const frontendCoveragePath = './coverage-reports/frontend-coverage/lcov.info';
            if (fs.existsSync(frontendCoveragePath)) {
              report += '### Frontend (TypeScript)\n';
              report += '- ✅ Coverage report generated\n';
              report += '- Report: `frontend/coverage/lcov.info`\n\n';
            }

            report += '---\n';
            report += '_Coverage reports are available as build artifacts. Download `combined-coverage` to view all reports._';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting & merge markers
        run: |
          npx --yes prettier@3.5.3 --check \
            ".github/**/*.{yml,yaml,md}" \
            "docs/**/*.md" \
            "frontend/src/**/*.{ts,tsx}"
          if grep -R -nE --exclude-dir=.git "^(<<<<<<<|=======|>>>>>>>)" .; then
            echo "Unresolved merge markers detected."
            exit 1
          fi
