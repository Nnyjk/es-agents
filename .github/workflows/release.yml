name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install conventional-changelog-cli
        run: npm install -g conventional-changelog-cli

      - name: Generate CHANGELOG for release
        run: |
          # Generate changelog for the specific version
          conventional-changelog -p angular -i CHANGELOG.md -s -r 0

      - name: Extract CHANGELOG section for version
        id: changelog
        run: |
          VERSION="${{ inputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          awk -v ver="## \\[${VERSION#v}\\]" '
            $0 ~ ver {found=1; next}
            found && /^## \[/ {found=0}
            found {print}
          ' CHANGELOG.md > RELEASE_NOTES.md

          # If no section found, use generate-notes fallback
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG section found, will use GitHub generated notes"
            echo "fallback=true" >> $GITHUB_OUTPUT
          else
            echo "fallback=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Frontend
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build

      - name: Build Server
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - run: mvn -B package -DskipTests --file server/pom.xml

      - name: Build Agent
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - run: |
          cd agent
          go build -o esa-agent ./cmd/agent

      - name: Create Release with CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"

          if [ "${{ steps.changelog.outputs.fallback }}" = "false" ]; then
            # Use generated CHANGELOG section
            gh release create "$VERSION" \
              --title "Release $VERSION" \
              --notes-file RELEASE_NOTES.md \
              ./frontend/dist/* \
              ./server/target/*.jar \
              ./agent/esa-agent
          else
            # Fallback to GitHub generated notes
            gh release create "$VERSION" \
              --title "Release $VERSION" \
              --generate-notes \
              ./frontend/dist/* \
              ./server/target/*.jar \
              ./agent/esa-agent
          fi
