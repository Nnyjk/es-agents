name: "✨ Feature Request"
description: "提出新功能建议或改进方案"
title: "[FEATURE] "
labels:
  - enhancement
  - status/review
body:
  - type: markdown
    attributes:
      value: |
        感谢你的想法！请描述“问题-目标-方案-验收标准”。

  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 当前痛点是什么？谁会受到影响？
      placeholder: 例如：当前无法批量导入配置，导致部署效率低。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 方案描述
      description: 描述你期望的功能和核心交互。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否评估过其他方案？为什么不选？

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 请用可验证的 checklist 描述。
      placeholder: |
        - [ ] 支持上传 CSV
        - [ ] 校验失败可定位到行号
        - [ ] 提供导入结果摘要
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: 主要模块
      options:
        - module/frontend
        - module/server
        - module/agent
        - module/docs
        - 其他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - priority/critical
        - priority/high
        - priority/medium
        - priority/low
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充材料
      description: 可附上原型图、竞品链接、日志或截图。
