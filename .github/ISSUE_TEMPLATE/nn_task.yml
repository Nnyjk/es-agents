name: "📋 Nn 任务"
description: "Nn 任务系统下发任务的标准模板"
title: "[Nn 任务] "
labels:
  - Nn 任务
  - codex
  - status/in-progress
body:
  - type: input
    id: task_id
    attributes:
      label: 任务 ID
      placeholder: 例如 NN-2026-0319-001
    validations:
      required: true

  - type: input
    id: dispatch_time
    attributes:
      label: 下发时间
      description: 使用 ISO 时间格式（UTC）
      placeholder: 2026-03-19T08:00:00Z
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - priority/critical
        - priority/high
        - priority/medium
        - priority/low
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 任务描述
      placeholder: 由 Nn 系统填写任务详细描述。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: |
        - [ ] 验收项 1
        - [ ] 验收项 2
        - [ ] 验收项 3
    validations:
      required: true

  - type: textarea
    id: deliverables
    attributes:
      label: 输出物
      placeholder: |
        1. 交付物 1
        2. 交付物 2

  - type: dropdown
    id: module
    attributes:
      label: 主要模块
      options:
        - module/frontend
        - module/server
        - module/agent
        - module/docs
        - 其他
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        **此任务由 Nn 任务系统自动创建**  
        **调度者**: Nn (Team Leader)  
        **执行者**: Codex
